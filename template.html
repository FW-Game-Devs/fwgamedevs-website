<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <title>Fort Wayne Game Devs</title>

    <link rel="apple-touch-icon" sizes="180x180" href="./favicon_io/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="./favicon_io/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="./favicon_io/favicon-16x16.png">
    <link rel="manifest" href="./favicon_io/site.webmanifest">
</head>

<body class="bg-[#FFFFFF] text-white min-h-screen flex flex-col">

    <!-- Navbar -->
    <nav class="sticky top-0 z-50 border-b border-gray-800 bg-[#000000] backdrop-blur">
        <div class="mx-auto flex max-w-7xl items-center justify-between px-1">

            <!-- Logo -->
            <a href="#" class="flex items-center gap-5">
                <img 
                    src="./images/fortcade-logo.png" 
                    alt="Fort Wayne Game Devs Logo"
                    class="h-16 w-20 object-contain"
                >

                <span class="hidden text-xl font-bold md:block">
                    Fort Wayne Game Devs
                </span>
            </a>

            <!-- Desktop Menu -->
            <div class="hidden items-center gap-8 md:flex">
                <a href="#" class="transition hover:text-blue-400">Home</a>
                <a href="#" class="transition hover:text-blue-400">About</a>
                <a href="#" class="transition hover:text-blue-400">Events</a>
                <a href="#" class="transition hover:text-blue-400">Community</a>

                <a 
                    href="#"
                    class="rounded-lg bg-blue-600 px-4 py-2 font-medium transition hover:bg-blue-500"
                >
                    Join Us
                </a>
            </div>

            <!-- Mobile Button -->
            <button 
                id="mobile-menu-button"
                class="md:hidden"
                aria-label="Toggle Menu"
            >
                <svg 
                    xmlns="http://www.w3.org/2000/svg"
                    class="h-7 w-7"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke="currentColor"
                >
                    <path 
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        stroke-width="2"
                        d="M4 6h16M4 12h16M4 18h16"
                    />
                </svg>
            </button>
        </div>

        <!-- Mobile Menu -->
        <div 
            id="mobile-menu"
            class="hidden border-t border-gray-800 bg-gray-900 md:hidden"
        >
            <div class="flex flex-col space-y-4 px-6 py-4">
                <a href="#" class="hover:text-blue-400">Home</a>
                <a href="#" class="hover:text-blue-400">About</a>
                <a href="#" class="hover:text-blue-400">Events</a>
                <a href="#" class="hover:text-blue-400">Community</a>

                <a 
                    href="#"
                    class="rounded-lg bg-blue-600 px-4 py-2 text-center font-medium hover:bg-blue-500"
                >
                    Join Us
                </a>
            </div>
        </div>
    </nav>

    <main class="flex-1">
        <!-- Page content -->
    </main>


    <!-- Footer -->
    <footer class="border-t border-[#2A4488] bg-gray-900">
        <div class="mx-auto flex max-w-7xl flex-col items-center justify-between gap-6 px-6 py-8 md:flex-row">

            <!-- Footer Title -->
            <div class="text-center md:text-left">
                <h2 class="text-lg font-semibold text-white">
                    Fort Wayne Game Devs
                </h2>

                <p class="mt-1 text-sm text-gray-400">
                    Building games. Growing community.
                </p>
            </div>

            <!-- Social Links -->
            <div class="flex items-center gap-5">

                <!-- Discord -->
                <a 
                    href="#"
                    aria-label="Discord"
                    class="text-gray-400 transition hover:text-white"
                >
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M20.317 4.369A19.791 19.791 0 0016.558 3c-.176.322-.379.76-.518 1.104a18.27 18.27 0 00-8.08 0A11.724 11.724 0 007.44 3a19.736 19.736 0 00-3.76 1.369C1.305 7.874.665 11.292.984 14.663a19.9 19.9 0 005.993 3.038c.48-.657.907-1.352 1.27-2.08-.698-.263-1.363-.59-1.986-.977.166-.12.329-.245.487-.373 3.828 1.797 7.977 1.797 11.76 0 .16.128.322.253.488.373-.624.387-1.29.714-1.989.978.364.726.79 1.42 1.27 2.078a19.875 19.875 0 005.995-3.037c.374-3.91-.64-7.298-2.956-10.294z"/>
                    </svg>
                </a>

                <!-- GitHub -->
                <a 
                    href="#"
                    aria-label="GitHub"
                    class="text-gray-400 transition hover:text-white"
                >
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="currentColor" viewBox="0 0 24 24">
                        <path fill-rule="evenodd" clip-rule="evenodd" d="M12 2C6.477 2 2 6.59 2 12.253c0 4.53 2.865 8.37 6.839 9.727.5.094.682-.22.682-.49 0-.24-.009-.875-.014-1.718-2.782.617-3.37-1.37-3.37-1.37-.455-1.18-1.11-1.495-1.11-1.495-.908-.636.069-.623.069-.623 1.004.072 1.532 1.053 1.532 1.053.892 1.57 2.341 1.116 2.91.853.091-.665.35-1.117.636-1.374-2.22-.258-4.555-1.14-4.555-5.073 0-1.12.39-2.036 1.03-2.754-.103-.26-.447-1.3.098-2.71 0 0 .84-.276 2.75 1.052A9.303 9.303 0 0112 6.844c.85.004 1.705.118 2.504.347 1.909-1.328 2.748-1.052 2.748-1.052.546 1.41.202 2.45.1 2.71.64.718 1.028 1.634 1.028 2.754 0 3.943-2.339 4.812-4.566 5.066.359.318.678.946.678 1.907 0 1.377-.012 2.487-.012 2.827 0 .272.18.588.688.488A10.01 10.01 0 0022 12.253C22 6.59 17.523 2 12 2z"/>
                    </svg>
                </a>

                <!-- Twitter / X -->
                <a 
                    href="#"
                    aria-label="Twitter"
                    class="text-gray-400 transition hover:text-white"
                >
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M18.244 2H21l-6.56 7.497L22.5 22h-6.828l-5.35-6.987L4.2 22H1.444l7.02-8.02L1.5 2h6.996l4.837 6.35L18.244 2zm-1.197 18h1.885L7.467 3.902H5.443L17.047 20z"/>
                    </svg>
                </a>

            </div>
        </div>

        <!-- Bottom Bar -->
        <div class="border-t border-gray-800 py-4 text-center text-sm text-gray-500">
            © 2026 Fort Wayne Game Devs. All rights reserved.
        </div>
    </footer>


    <script>
        const button = document.getElementById("mobile-menu-button");
        const menu = document.getElementById("mobile-menu");

        button.addEventListener("click", () => {
            menu.classList.toggle("hidden");
        });
    </script>

</body>
</html>
